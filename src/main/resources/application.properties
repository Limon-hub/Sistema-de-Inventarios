spring.application.name=inventarios
# Conexion a mysql
# Usa las variables de entorno DB_USER y DB_PASSWORD si estan definidas,
# de lo contrario usa "root" como valor por defecto (solo para desarrollo local)
spring.datasource.url=jdbc:mysql://localhost:3306/inventario_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Configurar el patron del log
logging.pattern.console=[%thread] %-5level: %logger - %msg%n
# Configurar el nivel de log (INFO)
logging.level.root=INFO
# Opcional, configurar niveles por paquetes
#logging.level.gm.inventarios=DEBUG
#logging.level.org.springframework=WARN
#Cambiar el puerto del servidor de tomcat
#server.port=8081
spring.main.banner-mode=off